<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脚本変換ツール — JP to Fountain</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;--border:#2a2a2e;
  --accent:#c8a96e;--accent2:#8b6f3e;--text:#e8e4dc;
  --text-muted:#7a7570;--text-dim:#4a4742;
  --success:#5a9e6f;--danger:#c06060;--gemini:#4285f4;
  --font-display:'Bebas Neue',sans-serif;
  --font-serif:'Shippori Mincho',serif;
  --font-mono:'DM Mono',monospace;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-serif);min-height:100vh;display:flex;flex-direction:column;}
header{border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo{display:flex;align-items:baseline;gap:12px;}
.logo-main{font-family:var(--font-display);font-size:28px;letter-spacing:.08em;color:var(--accent);}
.logo-sub{font-size:12px;color:var(--text-muted);letter-spacing:.1em;}
.credit{font-size:11px;color:var(--text-dim);text-align:right;line-height:1.8;}
.credit a{color:var(--accent2);text-decoration:none;}
.credit a:hover{color:var(--accent);}
.api-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;flex-direction:column;gap:12px;}
.switcher{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;width:fit-content;}
.tab{padding:7px 22px;font-family:var(--font-mono);font-size:12px;cursor:pointer;background:transparent;border:none;color:var(--text-muted);transition:all .2s;}
.tab:first-child{border-right:1px solid var(--border);}
.tab:hover{background:var(--surface2);color:var(--text);}
.tab-claude{background:rgba(200,169,110,.15)!important;color:var(--accent)!important;}
.tab-gemini{background:rgba(66,133,244,.15)!important;color:var(--gemini)!important;}
.api-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.api-label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:150px;}
.api-wrap{flex:1;min-width:200px;position:relative;}
.api-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 36px 8px 12px;font-family:var(--font-mono);font-size:12px;color:var(--text);outline:none;transition:border-color .2s;}
.api-input:focus{border-color:var(--accent2);}
.api-input::placeholder{color:var(--text-dim);}
.toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;}
.api-st{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;background:var(--surface2);color:var(--text-dim);}
.st-claude{background:rgba(200,169,110,.15);color:var(--accent);border:1px solid rgba(200,169,110,.3);}
.st-gemini{background:rgba(66,133,244,.15);color:var(--gemini);border:1px solid rgba(66,133,244,.3);}
.api-help{font-size:11px;color:var(--text-dim);}
.api-help a{color:var(--accent2);text-decoration:none;}
main{flex:1;display:grid;grid-template-columns:1fr 1fr;}
.pane{display:flex;flex-direction:column;border-right:1px solid var(--border);}
.pane:last-child{border-right:none;}
.pane-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.pane-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--text-muted);}
.pane-acts{display:flex;gap:8px;}
.btn-sm{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.btn-sm:hover{border-color:var(--accent2);color:var(--accent);}
textarea{flex:1;background:var(--bg);border:none;outline:none;resize:none;padding:20px;font-family:var(--font-mono);font-size:13px;line-height:1.8;color:var(--text);min-height:420px;}
textarea::placeholder{color:var(--text-dim);}
.output{flex:1;overflow-y:auto;padding:20px;font-family:var(--font-mono);font-size:13px;line-height:1.8;min-height:420px;white-space:pre-wrap;word-break:break-word;color:var(--text-dim);}
.output.active{color:var(--text);}
.footer{border-top:1px solid var(--border);padding:14px 32px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.opts{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.opt{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.opt select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-family:var(--font-mono);font-size:11px;color:var(--text);outline:none;cursor:pointer;}
.btn-cv{background:var(--accent);border:none;border-radius:var(--radius);padding:10px 28px;font-family:var(--font-display);font-size:18px;letter-spacing:.1em;color:var(--bg);cursor:pointer;transition:all .2s;}
.btn-cv:hover{opacity:.85;transform:translateY(-1px);}
.btn-cv:disabled{background:var(--surface2);color:var(--text-dim);cursor:not-allowed;transform:none;}
.btn-gemini{background:var(--gemini);}
.msg{font-family:var(--font-mono);font-size:11px;padding:4px 12px;border-radius:20px;display:none;}
.msg.show{display:inline-block;}
.msg-proc{color:var(--accent);background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.2);}
.msg-proc-g{color:var(--gemini);background:rgba(66,133,244,.1);border:1px solid rgba(66,133,244,.2);}
.msg-ok{color:var(--success);background:rgba(90,158,111,.1);border:1px solid rgba(90,158,111,.2);}
.msg-err{color:var(--danger);background:rgba(192,96,96,.1);border:1px solid rgba(192,96,96,.2);}
.prog{width:100%;height:2px;background:var(--surface2);}
.prog-fill{height:100%;width:0%;transition:width .3s;background:var(--accent);}
.prog-fill.g{background:var(--gemini);}
@media(max-width:680px){main{grid-template-columns:1fr;}.pane{border-right:none;border-bottom:1px solid var(--border);}header,.api-bar,.footer{padding:12px 16px;}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-main">FOUNTAIN CONVERTER</span>
    <span class="logo-sub">日本語脚本 → Fountain 変換ツール</span>
  </div>
  <div class="credit">
    Presented by <a href="https://www.cleo-inc.jp/d-club/" target="_blank">CLEO Directors' Club</a><br>
    顧問　花堂純次
  </div>
</header>

<div class="api-bar">
  <div class="switcher">
    <button class="tab tab-claude" id="tabC" onclick="switchAI('claude')">Claude (Anthropic)</button>
    <button class="tab" id="tabG" onclick="switchAI('gemini')">Gemini (Google)</button>
  </div>
  <div class="api-row">
    <span class="api-label" id="apiLabel">ANTHROPIC API KEY</span>
    <div class="api-wrap">
      <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-..." oninput="updateSt()">
      <button class="toggle" onclick="toggleVis()">👁</button>
    </div>
    <span class="api-st" id="apiSt">未設定</span>
    <span class="api-help">
      <a href="https://console.anthropic.com/" target="_blank" id="apiLink">console.anthropic.com</a> で取得。ブラウザ内のみ使用。
    </span>
  </div>
</div>

<div class="prog"><div class="prog-fill" id="prog"></div></div>

<main>
  <div class="pane">
    <div class="pane-hd">
      <span class="pane-title">INPUT — 日本語脚本</span>
      <div class="pane-acts">
        <button class="btn-sm" onclick="loadSample()">サンプル</button>
        <button class="btn-sm" onclick="document.getElementById('inp').value=''">クリア</button>
      </div>
    </div>
    <textarea id="inp" placeholder="ここに日本語脚本を貼り付けてください。&#10;&#10;長編脚本も対応。自動分割処理します。"></textarea>
  </div>
  <div class="pane">
    <div class="pane-hd">
      <span class="pane-title">OUTPUT — Fountain</span>
      <div class="pane-acts">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)" id="chunkInfo"></span>
        <button class="btn-sm" onclick="copyOut()">コピー</button>
        <button class="btn-sm" onclick="dlOut()">DL (.fountain)</button>
      </div>
    </div>
    <div class="output" id="out">変換結果がここに表示されます。

Fountain形式はFinal Draft、WriterDuet、
Highland 2などで開けます。</div>
  </div>
</main>

<div class="footer">
  <div class="opts">
    <label class="opt">出力言語
      <select id="lang">
        <option value="en">英語（標準）</option>
        <option value="ja">日本語のままFountain化</option>
      </select>
    </label>
    <label class="opt">分割サイズ
      <select id="chunk">
        <option value="3000">3000字（推奨）</option>
        <option value="5000">5000字</option>
        <option value="1500">1500字（高精度）</option>
      </select>
    </label>
    <span class="msg" id="msg"></span>
  </div>
  <button class="btn-cv" id="cvBtn" onclick="startConv()">CONVERT</button>
</div>

<script>
let AI = 'claude';

const SYS_EN = `You are an expert converting Japanese screenplays to Fountain format.
SCENE HEADINGS: 内部→INT. 外部→EXT. 昼→DAY 夜→NIGHT 朝→MORNING 夕方→DUSK. ALL CAPS. Format: INT. LOCATION - TIME
CHARACTER NAMES: ALL CAPS romanized (田中→TANAKA). One line before dialogue.
PARENTHETICALS: 括弧内→(parenthetical) between character and dialogue.
ACTION: Translate to English prose. TRANSITIONS: ○→FADE IN: 暗転→FADE OUT.
Output ONLY valid Fountain plain text. No markdown, no explanations.`;

const SYS_JA = `あなたは日本語脚本をFountain記法に変換する専門家です。日本語はそのままで構造だけFountain形式に。
シーン柱:「１ 事務所・内部・昼」→「INT. 事務所 - 昼」(ASCII大文字)
キャラクター名: 台詞直前に単独行、全大文字ローマ字(TANAKA等)
台詞: キャラクター名の直後の行。括弧内ト書き: (ト書き)形式。
Fountain純テキストのみ出力。説明文・マークダウン不要。`;

function switchAI(mode) {
  AI = mode;
  document.getElementById('tabC').className = 'tab' + (mode==='claude'?' tab-claude':'');
  document.getElementById('tabG').className = 'tab' + (mode==='gemini'?' tab-gemini':'');
  document.getElementById('cvBtn').className = 'btn-cv' + (mode==='gemini'?' btn-gemini':'');
  document.getElementById('prog').className = 'prog-fill' + (mode==='gemini'?' g':'');
  if (mode==='claude') {
    document.getElementById('apiLabel').textContent = 'ANTHROPIC API KEY';
    document.getElementById('apiKey').placeholder = 'sk-ant-api03-...';
    document.getElementById('apiLink').href = 'https://console.anthropic.com/';
    document.getElementById('apiLink').textContent = 'console.anthropic.com';
  } else {
    document.getElementById('apiLabel').textContent = 'GEMINI API KEY';
    document.getElementById('apiKey').placeholder = 'AIzaSy...';
    document.getElementById('apiLink').href = 'https://aistudio.google.com/app/apikey';
    document.getElementById('apiLink').textContent = 'aistudio.google.com';
  }
  document.getElementById('apiKey').value = '';
  updateSt();
}

function updateSt() {
  const k = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('apiSt');
  const ok = AI==='claude' ? (k.startsWith('sk-ant-') && k.length>20) : (k.startsWith('AIza') && k.length>20);
  el.textContent = ok ? '設定済み' : (k ? '形式確認' : '未設定');
  el.className = 'api-st' + (ok ? (AI==='claude'?' st-claude':' st-gemini') : '');
}

function toggleVis() {
  const i = document.getElementById('apiKey');
  i.type = i.type==='password'?'text':'password';
}

function chunks(text, size) {
  if (text.length<=size) return [text];
  const res=[], lines=text.split('\n');
  let cur='';
  for (const l of lines) {
    if (cur.length+l.length>size && cur.length>0) { res.push(cur.trim()); cur=l+'\n'; }
    else cur+=l+'\n';
  }
  if (cur.trim()) res.push(cur.trim());
  return res;
}

async function callClaude(key, text, i, n) {
  const sys = document.getElementById('lang').value==='en' ? SYS_EN : SYS_JA;
  const msg = n>1 ? `脚本の第${i+1}/${n}部分をFountain形式に：\n\n${text}` : `以下をFountain形式に変換：\n\n${text}`;
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,system:sys,messages:[{role:'user',content:msg}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.error?.message||`Error ${r.status}`);}
  const d=await r.json();
  return d.content?.map(b=>b.type==='text'?b.text:'').join('')||'';
}

async function callGemini(key, text, i, n) {
  const sys = document.getElementById('lang').value==='en' ? SYS_EN : SYS_JA;
  const msg = n>1 ? `脚本の第${i+1}/${n}部分をFountain形式に：\n\n${text}` : `以下をFountain形式に変換：\n\n${text}`;
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:sys}]},
      contents:[{role:'user',parts:[{text:msg}]}],
      generationConfig:{maxOutputTokens:4000,temperature:0.3}
    })
  });
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.error?.message||`Error ${r.status}`);}
  const d=await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

function setMsg(text, cls) {
  const el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg show '+cls;
  if(!text) el.className='msg';
}

function setProg(p) { document.getElementById('prog').style.width=p+'%'; }

async function startConv() {
  const key=document.getElementById('apiKey').value.trim();
  const input=document.getElementById('inp').value.trim();
  if(!key){setMsg('APIキーを入力してください','msg-err');return;}
  if(!input){setMsg('脚本を入力してください','msg-err');return;}

  document.getElementById('cvBtn').disabled=true;
  const out=document.getElementById('out');
  out.className='output active'; out.textContent='';
  setProg(0);

  const size=parseInt(document.getElementById('chunk').value);
  const cs=chunks(input,size);
  document.getElementById('chunkInfo').textContent=cs.length>1?`${cs.length}分割`:'';

  const results=[];
  try {
    for(let i=0;i<cs.length;i++){
      setMsg(`変換中… ${i+1}/${cs.length}`, AI==='claude'?'msg-proc':'msg-proc-g');
      setProg(Math.round(i/cs.length*90));
      const res = AI==='claude'
        ? await callClaude(key,cs[i],i,cs.length)
        : await callGemini(key,cs[i],i,cs.length);
      results.push(res);
      out.textContent=results.join('\n\n');
    }
    setProg(100);
    setMsg(`完了 — ${cs.length}セクション処理`,'msg-ok');
    setTimeout(()=>setProg(0),2000);
  } catch(e) {
    setMsg('エラー: '+e.message,'msg-err');
    setProg(0);
  }
  document.getElementById('cvBtn').disabled=false;
}

function copyOut() {
  const t=document.getElementById('out').textContent;
  if(!t||t.includes('変換結果'))return;
  navigator.clipboard.writeText(t).then(()=>setMsg('コピーしました','msg-ok'));
}

function dlOut() {
  const t=document.getElementById('out').textContent;
  if(!t||t.includes('変換結果'))return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));
  a.download='screenplay.fountain'; a.click();
}

function loadSample() {
  document.getElementById('inp').value=`タイトル：追憶の海

１　漁港・外部・夜明け

海霧の中、古びた漁港。波の音だけが響いている。

ケンジ（50代、無精髭、疲れた目）がコンテナに背を預けて煙草を吸っている。

遠くから足音。マリコ（40代、黒いコート）が近づいてくる。

マリコ「（息を切らせて）まだいたの。」

ケンジ「どこにも行けない。」

マリコ、ケンジの隣に立つ。二人は海を見る。

マリコ「あの夜のことを話して。」

長い沈黙。

ケンジ「（静かに）俺が殺したんだ。」`;
}
</script>
</body>
</html>
