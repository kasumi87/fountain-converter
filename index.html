<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脚本変換ツール — JP to Fountain</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #161618;
  --surface2: #1e1e21;
  --border: #2a2a2e;
  --accent: #c8a96e;
  --accent2: #8b6f3e;
  --text: #e8e4dc;
  --text-muted: #7a7570;
  --text-dim: #4a4742;
  --success: #5a9e6f;
  --danger: #c06060;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif: 'Shippori Mincho', serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-serif);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.logo-main {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.08em;
  color: var(--accent);
}

.logo-sub {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.header-credit {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-align: right;
  line-height: 1.8;
}

.header-credit a {
  color: var(--accent2);
  text-decoration: none;
}

.header-credit a:hover { color: var(--accent); }

.api-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.api-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.api-input-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}

.api-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 36px 8px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.api-input:focus { border-color: var(--accent2); }
.api-input::placeholder { color: var(--text-dim); }

.toggle-visibility {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  padding: 2px;
}

.api-status {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.api-status.empty { background: var(--surface2); color: var(--text-dim); }
.api-status.set { background: rgba(90,158,111,0.15); color: var(--success); border: 1px solid rgba(90,158,111,0.3); }

.api-help {
  font-size: 11px;
  color: var(--text-dim);
}

.api-help a { color: var(--accent2); text-decoration: none; }
.api-help a:hover { color: var(--accent); }

main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  overflow: hidden;
}

.pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  min-height: 0;
}

.pane:last-child { border-right: none; }

.pane-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
}

.pane-title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}

.pane-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn-small {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-small:hover { border-color: var(--accent2); color: var(--accent); }

textarea {
  flex: 1;
  background: var(--bg);
  border: none;
  outline: none;
  resize: none;
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
  min-height: 400px;
}

textarea::placeholder { color: var(--text-dim); }

.output-pane {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.8;
  min-height: 400px;
  white-space: pre-wrap;
  word-break: break-word;
}

.output-pane.empty { color: var(--text-dim); }
.output-pane.streaming { color: var(--text); }

.output-pane .scene-heading {
  color: var(--accent);
  font-weight: 500;
  display: block;
  margin-top: 1.2em;
}

footer-bar {
  display: block;
  border-top: 1px solid var(--border);
  padding: 14px 32px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.options-row {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.option-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}

.option-item select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  outline: none;
  cursor: pointer;
}

.option-item select:focus { border-color: var(--accent2); }

.btn-convert {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  padding: 10px 28px;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.1em;
  color: var(--bg);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-convert:hover { background: #d4b87e; transform: translateY(-1px); }
.btn-convert:active { transform: translateY(0); }
.btn-convert:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; transform: none; }

.status-msg {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
}

.status-msg.processing { color: var(--accent); background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.2); }
.status-msg.done { color: var(--success); background: rgba(90,158,111,0.1); border: 1px solid rgba(90,158,111,0.2); }
.status-msg.error { color: var(--danger); background: rgba(192,96,96,0.1); border: 1px solid rgba(192,96,96,0.2); }

.chunk-info {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.progress-bar {
  width: 100%;
  height: 2px;
  background: var(--surface2);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
  width: 0%;
}

@media (max-width: 700px) {
  main { grid-template-columns: 1fr; }
  .pane { border-right: none; border-bottom: 1px solid var(--border); }
  header { padding: 16px 20px; }
  .api-bar { padding: 10px 20px; }
  footer-bar { padding: 12px 20px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">FOUNTAIN CONVERTER</span>
    <span class="logo-sub">日本語脚本 → Fountain 変換ツール</span>
  </div>
  <div class="header-credit">
    Presented by <a href="https://www.cleo-inc.jp/d-club/" target="_blank">CLEO Directors' Club</a><br>
    顧問　花堂純次
  </div>
</header>

<div class="api-bar">
  <span class="api-label">ANTHROPIC API KEY</span>
  <div class="api-input-wrap">
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-..." oninput="updateApiStatus()">
    <button class="toggle-visibility" onclick="toggleKeyVisibility()" title="表示切替">👁</button>
  </div>
  <span class="api-status empty" id="apiStatus">未設定</span>
  <span class="api-help">APIキーは <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a> で取得できます。ブラウザ内のみで使用され、外部には送信されません。</span>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<main>
  <div class="pane">
    <div class="pane-header">
      <span class="pane-title">INPUT — 日本語脚本</span>
      <div class="pane-actions">
        <button class="btn-small" onclick="loadSample()">サンプル</button>
        <button class="btn-small" onclick="clearInput()">クリア</button>
      </div>
    </div>
    <textarea id="inputText" placeholder="ここに日本語脚本を貼り付けてください。

長編脚本も対応しています。
自動的に分割処理します。

例：
１　事務所・内部・昼

田中が窓の外を眺めている。

田中「もう終わりだ。」

佐藤「（冷静に）まだだ。」"></textarea>
  </div>

  <div class="pane">
    <div class="pane-header">
      <span class="pane-title">OUTPUT — Fountain</span>
      <div class="pane-actions">
        <span class="chunk-info" id="chunkInfo"></span>
        <button class="btn-small" onclick="copyOutput()">コピー</button>
        <button class="btn-small" onclick="downloadOutput()">DL (.fountain)</button>
      </div>
    </div>
    <div class="output-pane empty" id="outputPane">変換結果がここに表示されます。

Fountain形式はFinal Draft、WriterDuet、
Highland 2などで開けます。</div>
  </div>
</main>

<footer-bar>
  <div class="options-row">
    <label class="option-item">
      出力言語
      <select id="outputLang">
        <option value="en">英語（標準）</option>
        <option value="ja">日本語のままFountain化</option>
      </select>
    </label>
    <label class="option-item">
      分割サイズ
      <select id="chunkSize">
        <option value="3000">3000字（推奨）</option>
        <option value="5000">5000字</option>
        <option value="1500">1500字（低速・高精度）</option>
      </select>
    </label>
    <span class="status-msg" id="statusMsg" style="display:none"></span>
  </div>
  <button class="btn-convert" id="convertBtn" onclick="startConversion()">CONVERT</button>
</footer-bar>

<script>
const SYSTEM_EN = `You are an expert converting Japanese screenplays to Fountain format. Rules:

SCENE HEADINGS: Convert Japanese scene headers to Fountain sluglines.
- 内部/室内 → INT.  外部/屋外 → EXT.  両方 → INT./EXT.
- 昼/午前 → DAY  夜/深夜 → NIGHT  朝 → MORNING  夕方/黄昏 → DUSK  夜明け → DAWN
- Scene numbers: omit them, use format: INT. LOCATION - TIME
- Always ALL CAPS

CHARACTER NAMES: 
- Place character name on its own line, ALL CAPS, centered (Fountain auto-centers ALL CAPS lines before dialogue)
- Translate or romanize: 田中 → TANAKA, 佐藤 → SATO, 刑事 → DETECTIVE, etc.

DIALOGUE: Line immediately after character name.

PARENTHETICALS: 括弧内ト書き → (parenthetical) on its own line between character and dialogue.

ACTION/DESCRIPTION: Translate to English prose. Normal paragraphs.

TRANSITIONS: ○ → FADE IN:  暗転 → FADE OUT.  カット → CUT TO:

Output ONLY valid Fountain plain text. No markdown, no explanations, no backticks.`;

const SYSTEM_JA = `あなたは日本語脚本をFountain記法に変換する専門家です。日本語はそのままで、構造だけFountain形式にします。

シーンの柱: 「１　事務所・内部・昼」→「INT. 事務所 - 昼」（必ず全角ではなくASCII大文字）
キャラクター名: 台詞の直前に単独行、全大文字ローマ字（TANAKA, SATOなど）
台詞: キャラクター名の直後の行
ト書き括弧内: (ト書き) の形式
ト書き本文: そのまま段落として

Fountain純テキストのみ出力。説明文・マークダウン・バッククォート不要。`;

function getSystemPrompt() {
  return document.getElementById('outputLang').value === 'en' ? SYSTEM_EN : SYSTEM_JA;
}

function updateApiStatus() {
  const key = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('apiStatus');
  if (key.startsWith('sk-ant-') && key.length > 20) {
    el.textContent = '設定済み';
    el.className = 'api-status set';
  } else {
    el.textContent = key ? '形式を確認' : '未設定';
    el.className = 'api-status empty';
  }
}

function toggleKeyVisibility() {
  const input = document.getElementById('apiKey');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function chunkText(text, size) {
  const chunks = [];
  // Split at scene boundaries when possible
  const scenePattern = /(?=^[０-９\d]+[\s　])/m;
  if (text.length <= size) return [text];
  
  const lines = text.split('\n');
  let current = '';
  for (const line of lines) {
    if (current.length + line.length > size && current.length > 0) {
      chunks.push(current.trim());
      current = line + '\n';
    } else {
      current += line + '\n';
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

async function convertChunk(apiKey, text, chunkIndex, total) {
  const userMsg = total > 1 
    ? `以下は脚本の第${chunkIndex+1}/${total}部分です。Fountain形式に変換してください：\n\n${text}`
    : `以下の日本語脚本をFountain形式に変換してください：\n\n${text}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: getSystemPrompt(),
      messages: [{ role: 'user', content: userMsg }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }

  const data = await res.json();
  return data.content?.map(b => b.type === 'text' ? b.text : '').join('') || '';
}

function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = `status-msg ${type}`;
  el.style.display = msg ? 'inline-block' : 'none';
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

async function startConversion() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const input = document.getElementById('inputText').value.trim();

  if (!apiKey || !apiKey.startsWith('sk-ant-')) {
    setStatus('APIキーを入力してください', 'error'); return;
  }
  if (!input) {
    setStatus('脚本を入力してください', 'error'); return;
  }

  const btn = document.getElementById('convertBtn');
  btn.disabled = true;
  const output = document.getElementById('outputPane');
  output.className = 'output-pane streaming';
  output.textContent = '';
  setProgress(0);

  const size = parseInt(document.getElementById('chunkSize').value);
  const chunks = chunkText(input, size);
  document.getElementById('chunkInfo').textContent = chunks.length > 1 ? `${chunks.length}分割` : '';

  let results = [];
  try {
    for (let i = 0; i < chunks.length; i++) {
      setStatus(`変換中… ${i+1}/${chunks.length}`, 'processing');
      setProgress(Math.round((i / chunks.length) * 90));
      const result = await convertChunk(apiKey, chunks[i], i, chunks.length);
      results.push(result);
      output.textContent = results.join('\n\n');
    }
    setProgress(100);
    setStatus(`完了 — ${chunks.length}セクション処理`, 'done');
    setTimeout(() => setProgress(0), 2000);
  } catch (e) {
    setStatus('エラー: ' + e.message, 'error');
    setProgress(0);
  }

  btn.disabled = false;
}

function copyOutput() {
  const text = document.getElementById('outputPane').textContent;
  if (!text || text.includes('変換結果')) return;
  navigator.clipboard.writeText(text).then(() => setStatus('コピーしました', 'done'));
}

function downloadOutput() {
  const text = document.getElementById('outputPane').textContent;
  if (!text || text.includes('変換結果')) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'screenplay.fountain';
  a.click();
}

function clearInput() {
  document.getElementById('inputText').value = '';
}

function loadSample() {
  document.getElementById('inputText').value = `タイトル：追憶の海

１　漁港・外部・夜明け

海霧の中、古びた漁港。波の音だけが響いている。

ケンジ（50代、無精髭、疲れた目）がコンテナに背を預けて煙草を吸っている。

遠くから足音。マリコ（40代、黒いコート）が近づいてくる。

マリコ「（息を切らせて）まだいたの。」

ケンジ「どこにも行けない。」

マリコ、ケンジの隣に立つ。二人は海を見る。

マリコ「あの夜のことを話して。」

長い沈黙。

ケンジ「（静かに）俺が殺したんだ。」

２　漁港・船の上・回想・夜

激しい雨。ケンジとオサム（40代）が言い争っている。

オサム「お前には関係ない！」

ケンジ「（叫ぶ）離せ！」

揉み合い。オサムが甲板から落ちる。

水音。

ケンジ、動けずに立ちすくむ。

３　漁港・外部・現在・夜明け

マリコ「それは事故よ。」

ケンジ「俺が手を離した。」

水平線が白み始める。`;
}
</script>
</body>
</html>
